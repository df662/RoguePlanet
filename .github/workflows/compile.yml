name: Compile RoguePlanet

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v1

    - name: Compile
      run: cl RoguePlanet.cpp /link kernel32.lib bcrypt.lib taskschd.lib comsupp.lib virtdisk.lib ntdll.lib Rpcrt4.lib shlwapi.lib

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: RoguePlanet.exe
        path: RoguePlanet.exe
